# ============================================================
# CI/CD – Collector.shop
# Build → Test → Push to Artifact Registry → Deploy to Cloud Run
# ============================================================
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID         e.g. collector-shop-123456
#   GCP_REGION             e.g. europe-west1
#   GCP_SA_KEY             Base64-encoded service account JSON key
#                          (see setup guide for how to generate)
#   GCP_CLOUDRUN_SERVICE   e.g. collector-shop
#
# Optional Secrets (injected as Cloud Run env vars):
#   SECRET_KEY             Flask secret key
#   ADMIN_EMAIL            Admin account email
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASSWORD / SMTP_FROM
# ============================================================

name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: collector-shop
  # Artifact Registry repository name (created in setup)
  AR_REPO: collector-shop-repo

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Run unit & integration tests
  # ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest --tb=short --cov=app --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # 2. Build & push Docker image to Artifact Registry
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Build both a sha tag and latest — deploy job uses :latest
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # 3. Smoke-test the container before deploying
  # ──────────────────────────────────────────────────────────
  smoke-test:
    name: 🔍 Smoke Test Container
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Pull image
        run: |
          docker pull ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Run container and capture logs
        run: |
          # Start container in background
          docker run -d \
            --name smoke \
            -p 8000:8000 \
            -e PORT=8000 \
            -e DATABASE=/tmp/data/collectorshop.sqlite3 \
            -e APP_ENV=production \
            -e SECRET_KEY=testsecretfortesting \
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

          # Wait up to 30s for it to respond
          echo "Waiting for container to start..."
          for i in $(seq 1 15); do
            sleep 2
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/catalogue 2>/dev/null || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Container started successfully"
              docker stop smoke
              exit 0
            fi
          done

          # Failed — print full logs before exiting
          echo ""
          echo "❌ Container did not respond — printing logs:"
          echo "================================================"
          docker logs smoke
          echo "================================================"
          docker stop smoke || true
          exit 1

  # ──────────────────────────────────────────────────────────
  # 4. Deploy to Cloud Run
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Cloud Run
    needs: smoke-test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Debug — confirm secrets are populated (empty secrets appear as empty string, not ***)
      - name: Debug — check secrets are set
        run: |
          echo "GCP_PROJECT_ID is set:  ${{ secrets.GCP_PROJECT_ID != '' }}"
          echo "GCP_REGION is set:      ${{ secrets.GCP_REGION != '' }}"
          echo "GCP_SA_KEY is set:      ${{ secrets.GCP_SA_KEY != '' }}"
          echo "GCP_CLOUDRUN_SERVICE:   ${{ secrets.GCP_CLOUDRUN_SERVICE != '' }}"
          echo "SECRET_KEY is set:      ${{ secrets.SECRET_KEY != '' }}"
          echo "Image will be: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"

      # Build the image path directly here using secrets — avoids
      # cross-job output propagation issues
      - name: Resolve image name
        id: image
        run: |
          echo "path=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.GCP_CLOUDRUN_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ steps.image.outputs.path }}
          flags: --port=8000 --allow-unauthenticated --min-instances=0 --max-instances=3 --memory=512Mi
          env_vars: |
            APP_ENV=production
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            DATABASE=/tmp/data/collectorshop.sqlite3

      - name: Print deployed URL
        run: echo "✅ Deployed → ${{ steps.deploy.outputs.url }}"

      - name: Health check
        run: |
          URL="${{ steps.deploy.outputs.url }}/catalogue"
          echo "Checking $URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i — HTTP status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 3 attempts"
          exit 1
